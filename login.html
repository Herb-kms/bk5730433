<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 | 복사기마트</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="login-section">
        <div class="login-card">
            <a href="index.html" class="logo" style="display: block; margin-bottom: 20px;">복사기<span>마트</span></a>

            <div class="auth-tabs">
                <button class="auth-tab active" data-target="loginArea">로그인</button>
                <button class="auth-tab" data-target="signupArea">회원가입</button>
            </div>

            <!-- 로그인 폼 영역 -->
            <div id="loginArea" class="auth-area active">
                <h1 style="font-size: 1.5rem; margin-bottom: 5px;">환영합니다</h1>
                <p>복사기마트 계정에 로그인해 주세요.</p>
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label>아이디</label>
                        <input type="text" name="username" placeholder="아이디를 입력하세요" required>
                    </div>
                    <div class="form-group">
                        <label>비밀번호</label>
                        <input type="password" name="password" placeholder="비밀번호를 입력하세요" required>
                    </div>
                    <button type="submit" class="login-btn">로그인</button>
                    <div id="loginErrorMsg"
                        style="color: #ef4444; font-size: 0.85rem; margin-top: 10px; display: none; text-align: center; padding: 10px; background: #fef2f2; border-radius: 8px;">
                        아이디와 비번이 잘못입력되었습니다.</div>
                    <div style="margin-top: 15px; text-align: right;">
                        <!-- 데모용 안내 -->
                        <span style="font-size: 0.8rem; color: #94a3b8;">관리자: admin / admin1234</span>
                    </div>
                </form>
            </div>

            <!-- 회원가입 폼 영역 -->
            <div id="signupArea" class="auth-area">
                <h1 style="font-size: 1.5rem; margin-bottom: 5px;">회원가입</h1>
                <p style="font-size: 0.9rem; margin-bottom: 20px;">복사기마트의 새로운 가족이 되어주세요.</p>
                <form id="signupForm" class="login-form">
                    <div class="form-group">
                        <label>이름 <span style="color:#ef4444;">*</span></label>
                        <input type="text" name="real_name" placeholder="실명을 입력하세요" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>거래처명 / 업체명</label>
                        <input type="text" name="company_name" placeholder="소속된 업체명을 입력하세요 (선택)" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>회원 구분</label>
                        <select name="user_type"
                            style="width: 100%; padding: 15px; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 20px; outline: none; transition: 0.3s; background: #f8fafc;">
                            <option value="personal">일반 사용자 (개인)</option>
                            <option value="business">업체 사용자 (사업자)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>아이디</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required
                                autocomplete="off">
                            <button type="button" id="checkUserBtn"
                                style="padding: 0 15px; background: #94a3b8; color: white; border: none; border-radius: 12px; cursor: pointer; white-space: nowrap; font-size: 0.85rem; transition: 0.3s;">중복
                                확인</button>
                        </div>
                        <div id="userCriteria"
                            style="font-size: 0.75rem; color: #64748b; line-height: 1.4; margin-top: 5px;">
                            • 4~16자의 영문 소문자, 숫자만 가능<br>
                            • 한글/공백/특수문자 사용 불가
                        </div>
                        <div id="userMsg" style="font-size: 0.8rem; margin-top: 5px;"></div>
                    </div>
                    <div class="form-group">
                        <label>비밀번호</label>
                        <input type="password" id="password" name="password" placeholder="8자 이상, 특수문자 포함" required
                            style="margin-bottom: 5px;">
                        <div id="pwCriteria" style="font-size: 0.75rem; color: #64748b; line-height: 1.4;">
                            • 8자 이상, 특수문자 1개 이상 필수<br>
                            • 한글/공백 사용 불가
                        </div>
                    </div>
                    <div class="form-group">
                        <label>비밀번호 확인</label>
                        <input type="password" id="confirmPassword" placeholder="비밀번호를 다시 입력하세요" required>
                        <div id="matchMsg" style="font-size: 0.8rem; margin-top: 5px;"></div>
                    </div>
                    <div id="msgBox"
                        style="font-size: 0.9rem; margin-bottom: 15px; display: none; padding: 10px; border-radius: 8px;">
                    </div>
                    <button type="submit" id="submitBtn" class="login-btn">가입하기</button>
                </form>
            </div>

            <div style="margin-top: 20px;">
                <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> 홈으로 돌아가기</a>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
