    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/reviews.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header class="hero-nav-bar-fluid subpage-header">
        <a href="index.html" class="logo hero-logo">복사기<span>마트</span></a>

                <li><a href="reviews.html" class="nav-active">설치 후기</a></li>
            </ul>
        </nav>

        <div class="hero-auth" id="authSection">
            <a href="login.html" class="admin-login-btn">
                <i class="fas fa-user-cog"></i> 관리자 로그인
            </a>
        </div>
    
    </header>

    <section class="sub-hero">
        <div class="sub-hero-grid-bg"></div>
        <div class="sub-hero-glow-layer"></div>
        <div class="sub-hero-glow-layer-2"></div>
        <div class="sub-hero-grid-mask"></div>
        <div class="container" style="position: relative; z-index: 10;">
            <h1>고객 설치 후기</h1>
            <p>전국 곳곳, 복사기마트가 함께하는 스마트한 업무 공간을 소개합니다.</p>
        </div>
    </section>

    <!-- Reviews Section -->
    <section class="reviews" style="padding: 60px 0;">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2 style="font-size: 1.5rem; color: #1e2937;">생생한 설치 현장</h2>
            </div>

            <div class="review-filter" style="margin-bottom: 30px; justify-content: center;">
                <button class="filter-btn active" data-filter="all">전체보기</button>
                <button class="filter-btn" data-filter="samsung">삼성</button>
                <button class="filter-btn" data-filter="minolta">미놀타</button>
                <button class="filter-btn" data-filter="canon">캐논</button>
            </div>

            <div class="review-grid" id="reviewsGrid">
                <!-- Data fetched from API -->
            </div>
        </div>
    </section>

    <!-- 후기 상세 모달 -->
    <div class="modal" id="reviewDetailModal" style="display: none; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 40px 20px;">
        <div class="modal-content" style="max-width: 850px; text-align: left; padding: 40px; margin: 0 auto; background: #ffffff; height: auto;">
            <span class="close-modal" id="closeReviewDetailModalBtn" style="font-size: 2rem; position: absolute; right: 25px; top: 20px; cursor: pointer;">&times;</span>
            <h2 id="modalReviewTitle" style="font-size: 1.6rem; font-weight: 800; margin-bottom: 12px; color: #1e2937; padding-right: 30px;"></h2>
            <div id="modalReviewMeta" style="font-size: 0.85rem; color: #94a3b8; margin-bottom: 20px; display: flex; gap: 10px;"></div>
            <img id="modalReviewImg" src="" alt="후기 이미지" style="max-width: 100%; max-height: 55vh; object-fit: contain; display: none; margin: 0 auto 20px; border-radius: 12px;">
            <div id="modalReviewContent" style="font-size: 0.98rem; color: #475569; line-height: 1.8; max-height: 250px; overflow-y: auto; white-space: pre-wrap; margin-bottom: 25px;"></div>
            <div style="font-size: 0.88rem; color: #64748b; border-top: 1px solid #e2e8f0; padding-top: 20px; display: flex; align-items: center; gap: 8px;">
                <i class="fas fa-user-circle" style="font-size: 1.3rem;"></i>
                <span id="modalReviewAuthor"></span>
            </div>
        </div>
    </div>

    <!-- 플로팅 퀵 메뉴 -->
    <div class="floating-quick-bar">
        <div class="quick-menu-card">
            <div class="quick-card-header">
                <span>QUICK MENU</span>
            </div>
            <div class="quick-card-body">
                <div class="quick-card-section">
                    <span class="section-label"><i class="fas fa-phone-alt"></i> 전화상담</span>
                    <a href="tel:010-6593-0477" class="phone-number-link">010-6593-0477</a>
                    <span class="phone-hours">평일/주말 연중무휴</span>
                </div>
                <div class="quick-card-section">
                    <span class="section-label"><i class="fas fa-fax"></i> 팩스번호</span>
                    <span class="fax-number">031-574-3369</span>
                </div>
                <a href="https://open.kakao.com/o/sSzFO2O" target="_blank" class="quick-inquiry-btn">
                    <i class="fas fa-comment-dots"></i> 견적문의
                </a>
                <button class="quick-card-top-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'});" title="맨 위로 가기">
                    <i class="fas fa-arrow-up"></i> TOP
                </button>
            </div>
        </div>
    </div>

    <!-- 푸터 -->
    <footer>
        <div class="container footer-inner">
            <a href="index.html" class="logo footer-logo">복사기<span>마트</span></a>

            <p class="footer-copy">&copy; 2026 복사기마트 All Rights Reserved.</p>
        </div>
    </footer>

    
<script type="module" src="js/app.js"></script>

</html>
