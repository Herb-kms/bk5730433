            </a>
        </div>

        <button class="mobile-toggle-btn" id="mobileToggleBtn" aria-label="메뉴 열기">
            <i class="fas fa-bars"></i>
        </button>

    <!-- 서브 히어로 배너 -->
    <section class="sub-hero">
        <div class="sub-hero-grid-bg"></div>
        <div class="sub-hero-glow-layer"></div>

    <!-- 메인 콘텐츠 -->
    <main class="notice-page">
        <div class="container notice-container">
            
            <!-- 실시간 공지사항 검색 영역 추가 -->
            <div class="notice-search-bar-wrap">
                <div class="notice-search-box">
                    <i class="fas fa-search"></i>

                </div>
            </div>

            <div class="notice-table-wrap">
                <table class="notice-table">
                    <thead>
                        <tr>
                            <th class="notice-num">번호</th>
                            <th>제목</th>
                            <th class="notice-date">작성일</th>
                        </tr>
                    </thead>
                    <tbody id="noticeTbody">
                        <!-- 동적 공지사항 리스트 주입 영역 -->
                    </tbody>
                </table>
            </div>

            <!-- 동적 페이지네이션 영역 추가 -->
            <div class="pagination-container" id="noticePagination"></div>

        </div>
